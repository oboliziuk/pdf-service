services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEFAULT_REGION=us-east-1
    volumes:
      - "./localstack-init:/etc/localstack/init/ready.d"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth_service
    container_name: auth_service
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  pdf-service:
    build: ./pdf_service
    container_name: pdf_service
    restart: always
    env_file:
      - .env
    ports:
      - "8001:8001"
    command: uvicorn pdf:app --host 0.0.0.0 --port 8001
    depends_on:
      localstack:
        condition: service_healthy

  pdf-worker:
    build: ./pdf_service
    container_name: pdf_worker
    restart: always
    env_file:
      - .env
    command: python worker.py
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data: